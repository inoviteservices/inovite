<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 | Page Not Found</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #fff;
      font-family: 'Courier New', monospace;
      height: 100%;
      overflow: hidden;
    }

    #game {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom, #1c1c1c, #111);
    }

    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: #2e2e2e;
    }

    .runner {
      position: absolute;
      bottom: 60px;
      left: 100px;
      width: 40px;
      height: 40px;
      background: #00e0ff;
      border-radius: 5px;
      animation: run 0.3s steps(2) infinite;
    }

    .obstacle {
      position: absolute;
      bottom: 60px;
      width: 20px;
      height: 40px;
      background: #ff0040;
    }

    h1 {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3rem;
      color: #fff;
    }

    p {
      position: absolute;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      color: #aaa;
    }

    @keyframes run {
      0% { transform: translateY(0); }
      100% { transform: translateY(0); }
    }

    .jump {
      animation: jump 0.4s ease-out;
    }

    @keyframes jump {
      0% { bottom: 60px; }
      50% { bottom: 160px; }
      100% { bottom: 60px; }
    }
  </style>
</head>
<body>
  <div id="game">
    <h1>404 – Page Not Found</h1>
    <p>But hey, try jumping over bugs until we find the page...</p>
    <div class="runner" id="runner"></div>
    <div class="ground"></div>
  </div>

  <script>
    const game = document.getElementById('game');
    const runner = document.getElementById('runner');
    let isJumping = false;

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !isJumping) {
        runner.classList.add('jump');
        isJumping = true;
        setTimeout(() => {
          runner.classList.remove('jump');
          isJumping = false;
        }, 400);
      }
    });

    function createObstacle() {
      const obstacle = document.createElement('div');
      obstacle.classList.add('obstacle');
      obstacle.style.left = '100%';
      game.appendChild(obstacle);

      let position = 100;
      const moveInterval = setInterval(() => {
        if (position < -20) {
          clearInterval(moveInterval);
          obstacle.remove();
        } else {
          position -= 4;
          obstacle.style.left = position + '%';

          // Collision
          const runnerBottom = parseInt(window.getComputedStyle(runner).bottom);
          const obstacleLeft = parseInt(obstacle.style.left);
          if (obstacleLeft < 13 && obstacleLeft > 9 && runnerBottom <= 60) {
            alert('💀 Game Over — Page still not found.');
            location.reload();
          }
        }
      }, 20);
    }

    setInterval(createObstacle, 1600);
  </script>
</body>
</html>
