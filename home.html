<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inovite - Home</title>
  <link rel="icon" type="image/x-icon" href="pictures/inovite%20services.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fff;
    }

    /* Splash Screen */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease-in-out;
    }

    #splash img {
      max-width: 150px;
      animation: pop 0.6s ease-out;
    }

    @keyframes pop {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    #main {
      display: none;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .hero-section {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero-img-wrapper {
      height: 100%;
      width: 100%;
      position: relative;
    }

    .hero-img-wrapper img {
      object-fit: cover;
      height: 100%;
      width: 100%;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    .hero-text {
      position: absolute;
      z-index: 2;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .hero-text h1,
    .hero-text p {
      color: #ffffff;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.6);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <img src="pictures/inovite%20services.png" alt="Inovite Logo" />
  </div>

  <!-- Main Page -->
  <div id="main">
    <!-- Navbar -->
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top py-3">
  <div class="container-fluid">
    
    <!-- Mobile Toggle Button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Centered Links -->
    <div class="collapse navbar-collapse justify-content-center" id="navbarSupportedContent">
      <ul class="navbar-nav mb-2 mb-lg-0 gap-4">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#about">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#contact">Contact</a>
        </li>
      </ul>
    </div>
  </div>
</nav>



    <!-- Fullscreen Hero Section -->
    <section class="hero-section">
      <div class="hero-img-wrapper">
        <div class="overlay"></div>
        <img src="https://images.pexels.com/photos/9783353/pexels-photo-9783353.jpeg" alt="Inovite Banner" class="img-fluid">
        <div class="hero-text">
          <h1 class="display-4 fw-bold">Inovite Services</h1>
          <p class="fs-5">We build what others only dream of 💭</p>
        </div>
      </div>
    </section>

    <!-- About Section -->
    <section id="about" class="container py-5">
      <h2>About Us</h2>
      <p>We're a next-gen IT firm turning ideas into innovations.</p>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="container py-5">
      <h2>Contact Us</h2>
      <p>Reach out to collaborate or join the mission 🚀</p>
    </section>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Splash Screen Transition -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        const main = document.getElementById('main');

        splash.style.opacity = '0';

        setTimeout(() => {
          splash.style.display = 'none';
          main.style.display = 'block';
          setTimeout(() => {
            main.style.opacity = '1';
          }, 100);
        }, 1000);
      }, 2000);
    });
  </script>

</body>
</html>
