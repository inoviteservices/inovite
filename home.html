
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inovite - Home</title>
  <link rel="icon" type="image/x-icon" href="pictures/inovite%20services.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fff;
    }

    /* Splash Screen */
    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000; /* black background */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease-in-out;
    }

    #splash img {
      max-width: 150px;
      animation: pop 0.6s ease-out;
    }

    @keyframes pop {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    #main {
      display: none;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <img src="pictures/inovite%20services.png" alt="Inovite Logo" />

  </div>

  <!-- Main Page -->
  <div id="main">
    <!-- Place inside the #main div -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Inovite</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Fullscreen Hero Section -->
<section class="hero-section">
  <div class="hero-img-wrapper">
    <img src="https://images.pexels.com/photos/20818623/pexels-photo-20818623/free-photo-of-cherry-blossom-in-the-temple.jpeg" alt="Inovite Banner" class="img-fluid w-100 h-100 object-fit-cover">
    <div class="hero-text">
      <h1 class="display-4 text-white fw-bold">Building the Future</h1>
      <p class="text-white fs-5">We build what others only dream of 💭</p>
    </div>
  </div>
</section>

<!-- About Section -->
<section id="about" class="container py-5">
  <h2>About Us</h2>
  <p>We're a next-gen IT firm turning ideas into innovations.</p>
</section>

<!-- Contact Section -->
<section id="contact" class="container py-5">
  <h2>Contact Us</h2>
  <p>Reach out to collaborate or join the mission 🚀</p>
</section>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        const main = document.getElementById('main');

        splash.style.opacity = '0';

        setTimeout(() => {
          splash.style.display = 'none';
          main.style.display = 'block';
          setTimeout(() => {
            main.style.opacity = '1';
          }, 100);
        }, 1000); // matches transition duration
      }, 2000); // delay before fade
    });
  </script>
<style>
  .hero-section {
    position: relative;
    height: 100vh;
    overflow: hidden;
  }

  .hero-img-wrapper {
    height: 100%;
    width: 100%;
    position: relative;
  }

  .hero-img-wrapper img {
    object-fit: cover;
    height: 100%;
    width: 100%;
  }

  .hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .hero-text h1,
  .hero-text p {
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
  }
</style>
</body>
</html>
