<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inovite - Home</title>
  <link rel="icon" type="image/x-icon" href="pictures/inovite%20services.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1s ease;
    }

    #splash img {
      max-width: 150px;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    #main {
      display: none;
    }
  </style>
</head>
<body>

  <!-- 🔥 Splash Screen -->
  <div id="splash">
    <img src="pictures/inovite%20services.png" alt="Inovite Logo" />
  </div>

  <!-- 🚀 Main Landing Page (Bootstrap) -->
  <div id="main">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Inovite</a>
      </div>
    </nav>

    <section class="container text-center mt-5">
      <h1>Welcome to Inovite</h1>
      <p>We build what others dream of 💭</p>
    </section>

    <!-- Add your full landing content here -->
  </div>

  <script>
    // Delay splash screen
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('splash').style.display = 'none';
          document.getElementById('main').style.display = 'block';
        }, 1000); // wait for fade out
      }, 2000); // 2s splash time
    });
  </script>

</body>
</html>
