
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inovite - Home</title>
  <link rel="icon" type="image/x-icon" href="pictures/inovite%20services.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fff;
    }

    /* Splash Screen */
    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000; /* black background */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease-in-out;
    }

    #splash img {
      max-width: 150px;
      animation: pop 0.6s ease-out;
    }

    @keyframes pop {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    #main {
      display: none;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <img src="pictures/inovite%20services.png" alt="Inovite Logo" />

  </div>

  <!-- Main Page -->
  <div id="main">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Inovite</a>
      </div>
    </nav>

    <section class="container text-center mt-5">
      <h1>Welcome to Inovite</h1>
      <p>We build what others only dream of 💭</p>
    </section>
  </div>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        const main = document.getElementById('main');

        splash.style.opacity = '0';

        setTimeout(() => {
          splash.style.display = 'none';
          main.style.display = 'block';
          setTimeout(() => {
            main.style.opacity = '1';
          }, 100);
        }, 1000); // matches transition duration
      }, 2000); // delay before fade
    });
  </script>

</body>
</html>
